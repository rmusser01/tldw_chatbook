name: Backlog Guard

on:
  pull_request:
    paths:
      - 'backlog/tasks/**'
  push:
    branches: [dev, main]
    paths:
      - 'backlog/tasks/**'

jobs:
  duplicate-task-ids:
    name: No duplicate backlog task IDs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail on duplicate backlog task IDs
        run: |
          set -euo pipefail
          # Task files are named "task-<id> - <Title>.md"; subtask ids may be dotted (task-3.1).
          # Two branches minting the same id and merging separately produces two files that
          # share an id — backlog CLI lookups become ambiguous. This has happened three times
          # (ids 152+, 196-203, 246-256); catch it on every PR and again post-merge on dev.
          dupes=$(ls backlog/tasks | sed -nE 's/^(task-[0-9]+(\.[0-9]+)?) - .*\.md$/\1/p' | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error::Duplicate backlog task IDs detected:"
            while IFS= read -r id; do
              echo "--- $id ---"
              ls backlog/tasks | grep -F "$id - "
            done <<< "$dupes"
            echo "Renumber the batch that has not started (rename files, update frontmatter id:, dependencies:, and doc references)."
            exit 1
          fi
          echo "No duplicate task IDs across $(ls backlog/tasks | grep -c '^task-') task files."
